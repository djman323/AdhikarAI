services:
  - type: web
    name: adhikar-backend
    env: docker
    dockerfilePath: ./Dockerfile.backend
    plan: starter
    autoDeploy: true
    healthCheckPath: /health
    disk:
      name: adhikar-data
      mountPath: /app/data
      sizeGB: 1
    envVars:
      - key: LLM_PROVIDER
        value: gemini
      - key: GEMINI_MODEL
        value: gemini-2.0-flash-lite
      - key: GEMINI_FALLBACK_MODELS
        value: gemini-2.0-flash-lite,gemini-2.0-flash,gemini-1.5-flash-latest
      - key: GEMINI_API_KEY
        sync: false
      - key: ADHIKAR_DATA_DIR
        value: /app/data
      - key: ADHIKAR_DB_PATH
        value: /app/data/adhikar.sqlite3
      - key: ADHIKAR_CORS_ORIGINS
        sync: false
      - key: GUNICORN_WORKERS
        value: "2"
      - key: GUNICORN_TIMEOUT
        value: "240"

  - type: web
    name: adhikar-ui
    env: docker
    rootDir: ui
    dockerfilePath: ./Dockerfile
    plan: starter
    autoDeploy: true
    envVars:
      - key: BACKEND_API_URL
        sync: false